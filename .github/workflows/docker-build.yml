name: Build and Publish Docker Image

on:
    push:
        branches: [main]
        tags: ["v*"]
    pull_request:
        branches: [main]
    workflow_dispatch: # 手动触发

env:
    # 镜像配置
    REGISTRY: ghcr.io
    # 如果要发布到 Docker Hub，请修改为 'docker.io/yourusername/s3-browser'
    # FULL_IMAGE_NAME 将在步骤中设置为小写版本
    # 强制使用 Node.js 24 以避免弃用警告
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write # 需要推送镜像到 GHCR
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  submodules: recursive

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to container registry
              # 如果使用 GitHub Container Registry，使用 GitHub token 登录
              # 如果要使用 Docker Hub，请取消注释下面的登录步骤，并设置 secrets.DOCKERHUB_USERNAME 和 secrets.DOCKERHUB_TOKEN
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # - name: Log in to Docker Hub (可选)
            #   if: github.event_name != 'pull_request'
            #   uses: docker/login-action@v4
            #   with:
            #     registry: docker.io
            #     username: ${{ secrets.DOCKERHUB_USERNAME }}
            #     password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Calculate image name
              id: image-name
              run: |
                  # 将仓库名称转换为小写，Docker 要求镜像名称全小写
                  LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
                  FULL_IMAGE_NAME="${LOWERCASE_REPO}/s3-browser"
                  echo "lowercase_name=${FULL_IMAGE_NAME}" >> $GITHUB_OUTPUT
                  echo "Calculated image name: ${FULL_IMAGE_NAME}"

            - name: Extract metadata for Docker
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: |
                      ${{ env.REGISTRY }}/${{ steps.image-name.outputs.lowercase_name }}
                      # 如果要同时推送到多个仓库，添加其他镜像名称
                      # docker.io/yourusername/s3-browser
                  tags: |
                      type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=sha

            - name: Set up QEMU for multi-architecture builds
              uses: docker/setup-qemu-action@v4

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./test/Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      # 可以在这里传递构建参数
                      # GO_VERSION=1.25.0

            - name: Test the built image (单架构)
              if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
              run: |
                  # 使用 amd64 架构进行测试
                  docker run --rm -d --name test-s3-browser \
                    -e S3_ENDPOINT="http://localhost:3900" \
                    -e S3_REGION="garage" \
                    -e S3_ACCESS_KEY_ID="test" \
                    -e S3_SECRET_ACCESS_KEY="test" \
                    -e S3_BUCKET="test" \
                    -p 8080:8080 \
                    ${{ env.REGISTRY }}/${{ steps.image-name.outputs.lowercase_name }}:sha-${GITHUB_SHA:0:7}

                  # 等待服务启动
                  sleep 10

                  # 测试健康检查端点
                  curl -f http://localhost:8080/healthz

                  # 停止容器
                  docker stop test-s3-browser

            - name: Generate image summary
              if: always()
              run: |
                  echo "## Docker 镜像信息" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**镜像名称:** \`${{ env.REGISTRY }}/${{ steps.image-name.outputs.lowercase_name }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**标签:**" >> $GITHUB_STEP_SUMMARY
                  echo "- \`${{ env.REGISTRY }}/${{ steps.image-name.outputs.lowercase_name }}:sha-${GITHUB_SHA:0:7}\`" >> $GITHUB_STEP_SUMMARY
                  if [[ "${{ github.ref }}" == refs/tags/* ]]; then
                    TAG=${GITHUB_REF#refs/tags/}
                    echo "- \`${{ env.REGISTRY }}/${{ steps.image-name.outputs.lowercase_name }}:$TAG\`" >> $GITHUB_STEP_SUMMARY
                  fi
                  if [[ "${{ github.event_name }}" != "pull_request" ]]; then
                    echo "- \`${{ env.REGISTRY }}/${{ steps.image-name.outputs.lowercase_name }}:latest\` (所有非 PR 构建都会生成)" >> $GITHUB_STEP_SUMMARY
                  fi
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**支持的架构:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**使用示例:**" >> $GITHUB_STEP_SUMMARY
                  echo '```bash' >> $GITHUB_STEP_SUMMARY
                  echo "docker run -d \\" >> $GITHUB_STEP_SUMMARY
                  echo "  -e S3_ENDPOINT=\"http://your-s3-endpoint\" \\" >> $GITHUB_STEP_SUMMARY
                  echo "  -e S3_REGION=\"your-region\" \\" >> $GITHUB_STEP_SUMMARY
                  echo "  -e S3_ACCESS_KEY_ID=\"your-access-key\" \\" >> $GITHUB_STEP_SUMMARY
                  echo "  -e S3_SECRET_ACCESS_KEY=\"your-secret-key\" \\" >> $GITHUB_STEP_SUMMARY
                  echo "  -e S3_BUCKET=\"your-bucket\" \\" >> $GITHUB_STEP_SUMMARY
                  echo "  -p 8080:8080 \\" >> $GITHUB_STEP_SUMMARY
                  echo "  ${{ env.REGISTRY }}/${{ steps.image-name.outputs.lowercase_name }}:latest" >> $GITHUB_STEP_SUMMARY
                  echo '```' >> $GITHUB_STEP_SUMMARY
